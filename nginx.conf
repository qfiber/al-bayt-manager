# Al-Bayt Manager SaaS — Nginx Configuration
# Domain: albayt.cloud
# Wildcard SSL cert required for *.albayt.cloud

# Redirect HTTP to HTTPS (all domains)
server {
    listen 80;
    server_name albayt.cloud www.albayt.cloud *.albayt.cloud;
    return 301 https://$host$request_uri;
}

# Main domain — Landing page + general login/register
server {
    listen 443 ssl http2;
    server_name albayt.cloud www.albayt.cloud;

    ssl_certificate /etc/letsencrypt/live/albayt.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/albayt.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /home/building/public_html/dist;
    index index.html;

    # SSE endpoint (long-lived connections)
    location /api/sse/ {
        proxy_pass http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        client_max_body_size 10M;
    }

    # Public uploads (logos, avatars)
    location /public-uploads/ {
        alias /home/building/public_html/public-uploads/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";
    }

    # Prerendered pages for bots (SEO + AI crawlers)
    set $prerender 0;
    if ($http_user_agent ~* "Googlebot|Bingbot|Slurp|DuckDuckBot|Baiduspider|YandexBot|facebookexternalhit|Twitterbot|LinkedInBot|WhatsApp|Applebot|ChatGPT-User|GPTBot|ClaudeBot|Claude-Web|Bytespider|PetalBot|AhrefsBot|SemrushBot") {
        set $prerender 1;
    }

    # Don't prerender API, assets, or already-prerendered pages
    if ($uri ~* "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|json|xml|txt)$") {
        set $prerender 0;
    }

    # Serve prerendered HTML to bots
    location / {
        if ($prerender = 1) {
            rewrite ^/$ /prerendered/index.html break;
            rewrite ^/pricing$ /prerendered/pricing.html break;
            rewrite ^/faq$ /prerendered/faq.html break;
            rewrite ^/contact$ /prerendered/contact.html break;
            rewrite ^/privacy-policy$ /prerendered/privacy-policy.html break;
            rewrite ^/terms$ /prerendered/terms.html break;
            rewrite ^/login$ /prerendered/login.html break;
            rewrite ^/register$ /prerendered/register.html break;
        }
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Wildcard subdomains
# app.albayt.cloud  → Super-admin panel
# *.albayt.cloud    → Per-org landlord/tenant portals
server {
    listen 443 ssl http2;
    server_name *.albayt.cloud;

    ssl_certificate /etc/letsencrypt/live/albayt.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/albayt.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /home/building/public_html/dist;
    index index.html;

    # SSE endpoint (long-lived connections)
    location /api/sse/ {
        proxy_pass http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        client_max_body_size 10M;
    }

    # Public uploads
    location /public-uploads/ {
        alias /home/building/public_html/public-uploads/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
